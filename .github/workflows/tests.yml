name: Tests

on:
  push:
    branches:
      - "develop"
  pull_request:
    branches:
      - "develop"

env:
  APP_ENV: testing
  APP_DEBUG: "false"
  APP_KEY: SomeRandomString3232RandomString
  APP_TIMEZONE: UTC
  APP_URL: http://localhost/
  CACHE_DRIVER: array
  MAIL_MAILER: array
  SESSION_DRIVER: array
  QUEUE_DRIVER: sync
  HASHIDS_SALT: test123

jobs:
  mysql:
    name: MySQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: ""

    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        database:
          - mariadb:10
          - mariadb:11
          - mysql:8
          - mysql:9
    services:
      database:
        image: ${{ matrix.database }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, cli, curl, gd, mbstring, mysql, openssl, pdo, tokenizer, xml, zip, intl
          tools: composer:v2
          coverage: none

      - id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - run: composer install --no-interaction --no-progress --no-suggest --prefer-dist

      - name: Unit tests
        run: vendor/bin/pest tests/Unit --parallel
        env:
          DB_HOST: UNIT_NO_DB

      - name: Integration tests
        run: vendor/bin/pest tests/Integration --parallel
        env:
          DB_PORT: ${{ job.services.database.ports[3306] }}

  mariadb:
    name: MariaDB
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: ""

    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        database:
          - mariadb:10
          - mariadb:11
    services:
      database:
        image: ${{ matrix.database }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, cli, curl, gd, mbstring, mysql, openssl, pdo, tokenizer, xml, zip, intl
          tools: composer:v2
          coverage: none

      - id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - run: composer install --no-interaction --no-progress --no-suggest --prefer-dist

      - name: Unit tests
        run: vendor/bin/pest tests/Unit --parallel
        env:
          DB_HOST: UNIT_NO_DB

      - name: Integration tests
        run: vendor/bin/pest tests/Integration --parallel
        env:
          DB_PORT: ${{ job.services.database.ports[3306] }}